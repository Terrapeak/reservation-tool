<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/admin-ui.css" />
    <link rel="stylesheet" href="/src/public-ui.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TerraPeak Reservations</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      if (window.location.pathname.includes('/dashboard')) {
        const internalPath = window.location.pathname.replace('/dashboard', '/admin')
        window.history.replaceState({}, '', `${internalPath}${window.location.search}${window.location.hash}`)
      }
    </script>
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/admin-enhancements.js"></script>
    <script type="module">
      if (window.location.pathname.includes('/admin')) {
        const publicPath = window.location.pathname.replace('/admin', '/dashboard')
        window.history.replaceState({}, '', `${publicPath}${window.location.search}${window.location.hash}`)
      }
    </script>
  </body>
</html>
